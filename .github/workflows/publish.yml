name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch: # Allow manual trigger

# IMPORTANT: This enables OIDC for npm
# Configure npm trusted publishing with: muxinc/ai + workflow: publish.yml
permissions:
  contents: read
  id-token: write # Required for npm publish with OIDC

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1 # Pinned: 22.22.2 has broken npm (nodejs/node#62425)
          cache: npm

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
